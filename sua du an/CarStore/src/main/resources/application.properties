# ================== SERVER ==================
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.mandatory-file-encoding=UTF-8

# ================== SQL SERVER ==================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CarStore;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================== INIT DATA (SQL Server) ==================
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ================== THYMELEAF ==================
spring.thymeleaf.cache=false

# ================== GOOGLE OAUTH2 ==================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-placeholder}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

# ================== Mail ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true