# ================== SERVER ==================
spring.config.import=optional:file:.env[.properties]
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.jpa.open-in-view=false

# ================== SQL SERVER ==================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=CarStore;encrypt=false;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ================== INIT DATA (SQL Server) ==================
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ================== GOOGLE OAUTH2 ==================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-placeholder}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

# ================== Mail ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
