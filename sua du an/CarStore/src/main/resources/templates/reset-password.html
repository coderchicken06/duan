<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đặt lại mật khẩu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body>
<div th:replace="fragments/header :: header(false, true)"></div>

<div class="container cs-container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="cs-card">
                <div class="cs-card-header p-4">
                    <div class="cs-badge mb-3">🔐 Reset Password</div>
                    <h2 class="cs-page-title mb-1">Đặt lại mật khẩu</h2>
                    <div class="cs-muted">Tạo mật khẩu mới cho tài khoản của bạn.</div>
                </div>

                <div class="p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form action="/reset-password" method="post" class="vstack gap-3">
                        <div>
                            <label class="form-label cs-muted">Mật khẩu mới</label>
                            <input class="form-control" type="password" name="password"
                                   placeholder="Nhập mật khẩu mới" required>
                        </div>

                        <div>
                            <label class="form-label cs-muted">Xác nhận mật khẩu</label>
                            <input class="form-control" type="password" name="confirmPassword"
                                   placeholder="Nhập lại mật khẩu mới" required>
                        </div>

                        <button class="btn cs-btn cs-btn-primary w-100" type="submit">
                            Đổi mật khẩu
                        </button>

                        <a class="btn cs-btn cs-btn-ghost w-100" href="/login/form">
                            Quay lại đăng nhập
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
