<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body>

    <div th:replace="fragments/header :: header(false, false)"></div>

    <div class="container cs-container py-4">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">📦 Chi tiết đơn hàng</div>
            <h1 class="cs-page-title mb-0">Đơn hàng #<span th:text="${order.id}"></span></h1>
            <div class="cs-muted">Ngày đặt: <span
                    th:text="${#dates.format(order.create_date, 'dd/MM/yyyy HH:mm')}"></span></div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-8">
                <div class="cs-card p-4">
                    <h3 class="h5 mb-3">Sản phẩm đã đặt</h3>
                    <div class="table-responsive">
                        <table class="table cs-table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Tên xe</th>
                                    <th class="text-end">Giá</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-end">Thành tiền</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="detail : ${details}">
                                    <td>
                                        <span th:text="${detail.car != null ? detail.car.name : 'Không xác định'}">Car
                                            Name</span>
                                    </td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(detail.price,0,'COMMA',0,'POINT')} + ' VNĐ'">
                                    </td>
                                    <td class="text-center" th:text="${detail.quantity}"></td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(detail.price*detail.quantity,0,'COMMA',0,'POINT')} + ' VNĐ'">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="cs-card p-4">
                    <h3 class="h5 mb-3">Thông tin đơn hàng</h3>
                    <div class="mb-3">
                        <span class="cs-muted">Trạng thái:</span>
                        <span class="badge bg-primary" th:text="${order.status}"></span>
                    </div>
                    <div class="mb-3">
                        <span class="cs-muted">Địa chỉ giao hàng:</span>
                        <p th:text="${order.address}"></p>
                    </div>
                    <div class="mb-3">
                        <span class="cs-muted">Tổng tiền:</span>
                        <div class="h5 fw-bold text-primary">
                            <span th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' VNĐ'"></span>
                        </div>
                    </div>
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div class="mb-3">
                        <span class="cs-muted">Trạng thái tiền cọc:</span>
                        <strong th:text="${order.depositStatus != null ? order.depositStatus : 'UNPAID'}"></strong>
                    </div>
                    <div th:if="${order.depositAmount != null}" class="mb-3">
                        <span class="cs-muted">Tiền cọc đã thanh toán:</span>
                        <strong th:text="${#numbers.formatDecimal(order.depositAmount,0,'COMMA',0,'POINT')} + ' VNĐ'"></strong>
                    </div>
                    <form th:if="${order.status == 'CONFIRMED' and order.depositStatus != 'PAID'}"
                          th:action="@{'/order/deposit/' + ${order.id}}" method="post" class="border-top pt-3 mb-3">
                        <label class="form-label fw-bold">Thanh toán tiền cọc 10%</label>
                        <div class="text-danger fw-bold mb-2"
                             th:text="${#numbers.formatDecimal(depositAmount,0,'COMMA',0,'POINT')} + ' VNĐ'"></div>
                        <select name="method" class="form-select mb-2" required>
                            <option value="BANK_TRANSFER">Chuyển khoản ngân hàng</option>
                            <option value="VNPAY">VNPay mô phỏng</option>
                            <option value="CASH_AT_SHOWROOM">Thanh toán tại showroom</option>
                        </select>
                        <button class="btn cs-btn cs-btn-primary w-100" type="submit">Thanh toán tiền cọc</button>
                    </form>
                    <a href="/order/my-orders" class="btn cs-btn cs-btn-ghost w-100">Quay lại danh sách</a>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
