<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thống kê - CarStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body>

    <div th:replace="fragments/header :: header(false, false)"></div>

    <div class="container cs-container py-4">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">📊 Reports</div>
            <h1 class="cs-page-title mb-1">Thống kê kinh doanh</h1>
            <div class="cs-muted">Dữ liệu doanh thu và hiệu suất bán hàng.</div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-6">
                <div class="cs-card p-4 border-start border-primary border-4">
                    <div class="cs-muted mb-2">Tổng doanh thu thực tế</div>
                    <div class="display-6 fw-bold text-primary"
                        th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                        0 VNĐ
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mt-3">
            <div class="col-12">
                <div class="cs-card p-4">
                    <div class="cs-muted mb-4">Danh sách xe bán chạy</div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Tên dòng xe</th>
                                    <th>Số lượng bán ra</th>
                                    <th>Hiệu suất</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="row : ${topCars}">
                                    <td class="fw-bold" th:text="${row[0]}">Tên xe</td>
                                    <td th:text="${row[1]}">0</td>
                                    <td><span class="badge bg-success">Hot</span></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(topCars)}">
                                    <td colspan="3" class="text-center py-4 cs-muted">Chưa có dữ liệu bán hàng.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <a href="/admin/dashboard" class="btn cs-btn cs-btn-ghost">← Quay lại Dashboard</a>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
