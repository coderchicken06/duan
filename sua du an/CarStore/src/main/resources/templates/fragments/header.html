<header th:fragment="header(showSearch, simpleLogin)"
        class="ford-header"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="ford-header-inner">

        <nav class="ford-nav-left">
            <a href="/car/list">Sản phẩm</a>
            <a href="/cart/view">Mua xe</a>
            <a href="/service">Dịch vụ</a>
            <a href="/support">Hỗ trợ</a>
        </nav>

        <a class="ford-logo" href="/">CarStore</a>

        <div class="ford-nav-right">

            <button th:if="${showSearch}"
                    type="button"
                    class="ford-icon-btn"
                    id="fordSearchToggle"
                    title="Tìm kiếm">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>

            <a th:if="${simpleLogin}"
               href="/login/form"
               class="ford-icon-btn"
               title="Đăng nhập">
                <svg viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </a>

            <th:block th:if="${!simpleLogin}">

                <a sec:authorize="isAnonymous()"
                   href="/login"
                   class="ford-icon-btn"
                   title="Đăng nhập">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </a>

                <details sec:authorize="hasRole('USER')" class="role-dropdown">
                    <summary class="ford-icon-btn" title="Lịch sử">
                        <svg viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 1 0 3-6.7"/>
                            <polyline points="3 3 3 9 9 9"/>
                            <polyline points="12 7 12 12 16 14"/>
                        </svg>
                    </summary>
                    <div class="role-menu-panel">
                        <a href="/order/my-orders">📦 Lịch sử đơn hàng</a>
                        <a href="/history">📋 Lịch sử yêu cầu</a>
                    </div>
                </details>

                <details sec:authorize="hasRole('ADMIN')" class="role-dropdown">
                    <summary class="ford-icon-btn" title="Quản lý">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="3"/>
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
                        </svg>
                    </summary>
                    <div class="role-menu-panel">
                        <a href="/admin/dashboard">📊 Thống kê</a>
                        <a href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a href="/admin/users">👥 Quản lý khách hàng</a>
                        <a href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </details>

                <a sec:authorize="isAuthenticated()" href="/profile" class="ford-icon-btn" title="Profile">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </a>

                <a sec:authorize="isAuthenticated()" href="/logout" class="ford-icon-btn" title="Đăng xuất">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </a>

            </th:block>
        </div>
    </div>

    <div th:if="${showSearch}" class="ford-search-row" id="fordSearchBar" aria-hidden="true">
        <form class="ford-search-form" method="get" th:action="@{/car/list}">
            <input type="search" name="q" th:value="${q}" placeholder="Tìm kiếm tên xe..." autocomplete="off"/>
            <button type="submit">Tìm</button>
        </form>
    </div>

</header>
