<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
    </meta>
</head>

<body>

    <div th:replace="fragments/header :: header(false, false)"></div>
    <div class="container cs-container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-7 col-lg-5">
                <div class="cs-card">
                    <div class="cs-card-header p-4">
                        <div class="cs-badge mb-3">👤 Tài khoản cá nhân</div>
                        <h2 class="cs-page-title mb-1">Quản lý profile</h2>
                        <div class="cs-muted">Cập nhật thông tin cá nhân của bạn.</div>
                    </div>
                    <div class="p-4">
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/profile/update}" method="post" class="vstack gap-3">
                            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}" />
                            <div>
                                <label class="form-label cs-muted">Tên đăng nhập</label>
                                <input class="form-control" type="text"
                                    th:value="${account != null ? account.username : ''}" readonly>
                            </div>
                            <div>
                                <label class="form-label cs-muted">Họ và tên</label>
                                <input class="form-control" type="text" name="fullname"
                                    th:value="${account != null ? account.fullname : ''}" required>
                            </div>
                            <div>
                                <label class="form-label cs-muted">Email</label>
                                <input class="form-control" type="email" name="email"
                                    th:value="${account != null ? account.email : ''}" required>
                            </div>
                            <div>
                                <label class="form-label cs-muted">Mật khẩu mới (để trống nếu không đổi)</label>
                                <input class="form-control" type="password" name="password"
                                    placeholder="Nhập mật khẩu mới">
                            </div>
                            <button class="btn cs-btn cs-btn-primary w-100" type="submit">Cập nhật</button>
                            <div sec:authorize="hasRole('ADMIN')" class="vstack gap-2">
                                <a class="btn cs-btn cs-btn-ghost w-100" href="/admin/dashboard">📊 Thống kê</a>
                                <a class="btn cs-btn cs-btn-ghost w-100" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                                <a class="btn cs-btn cs-btn-ghost w-100" href="/admin/users">👥 Quản lý khách hàng</a>
                                <a class="btn cs-btn cs-btn-ghost w-100" href="/admin/orders">📦 Quản lý đơn hàng</a>
                                <a class="btn cs-btn cs-btn-ghost w-100" href="/admin/support">📋 Quản lý yêu cầu</a>
                            </div>
                            <a sec:authorize="hasRole('USER')" class="btn cs-btn cs-btn-ghost w-100"
                                href="/order/my-orders">Lịch sử đơn hàng</a>
                            <a sec:authorize="hasRole('USER')" class="btn cs-btn cs-btn-ghost w-100"
                                href="/history">Lịch sử yêu cầu</a>
                            <a class="btn cs-btn cs-btn-ghost w-100" href="/">Về trang chủ</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
