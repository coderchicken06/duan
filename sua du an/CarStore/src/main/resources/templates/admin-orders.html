<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Quản lý đơn hàng - CarStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tổng đơn hàng</div>
                    <div class="display-6 fw-bold" th:text="${#lists.size(orders)}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">PENDING</div>
                    <div class="display-6 fw-bold text-primary" th:text="${#lists.size(orders.?[status == 'PENDING'])}">
                        0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">DELIVERED</div>
                    <div class="display-6 fw-bold text-success"
                        th:text="${#lists.size(orders.?[status == 'DELIVERED'])}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">CANCELLED</div>
                    <div class="display-6 fw-bold text-danger"
                        th:text="${#lists.size(orders.?[status == 'CANCELLED'])}">0</div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng quản lý</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/dashboard">📊 Thống kê</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/users">👥 Quản lý khách hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <h5 class="fw-bold mb-3">📦 Danh sách đơn hàng</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Ngày đặt</th>
                                    <th>Địa chỉ</th>
                                    <th>Trạng thái</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td th:text="${order.id}"></td>
                                    <td th:text="${order.username}"></td>
                                    <td th:text="${#dates.format(order.create_date, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td th:text="${order.address}"></td>
                                    <td>
                                        <form class="d-inline" method="post" th:action="@{/admin/orders/update-status}">
                                            <input name="id" th:value="${order.id}" type="hidden" /><select
                                                class="form-select form-select-sm" name="status"
                                                onchange="this.form.submit()">
                                                <option th:selected="${order.status == 'PENDING'}" th:value="'PENDING'">
                                                    PENDING</option>
                                                <option th:selected="${order.status == 'CONFIRMED'}" th:value="'CONFIRMED'">
                                                    CONFIRMED - Đã duyệt, chờ cọc</option>
                                                <option th:selected="${order.status == 'PROCESSING'}" th:value="'PROCESSING'">
                                                    PROCESSING - Đã cọc</option>
                                                <option th:selected="${order.status == 'DELIVERED'}"
                                                    th:value="'DELIVERED'">DELIVERED</option>
                                                <option th:selected="${order.status == 'CANCELLED'}"
                                                    th:value="'CANCELLED'">CANCELLED</option>
                                            </select>
                                        </form>
                                    </td>
                                    <td><a class="btn btn-danger btn-sm"
                                            onclick="return confirm('Bạn có chắc muốn xóa đơn hàng này không?')"
                                            th:href="@{'/admin/orders/delete/' + ${order.id}}">Delete</a></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(orders)}">
                                    <td class="text-center cs-muted" colspan="6">Chưa có đơn hàng nào.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
