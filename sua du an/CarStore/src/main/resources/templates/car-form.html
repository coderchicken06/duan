<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Thêm / Sửa xe - CarStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Khu vực</div>
                    <div class="h3 fw-bold">Admin</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">Chức năng</div>
                    <div class="h3 fw-bold text-primary">Xe</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tồn kho</div>
                    <div class="h3 fw-bold text-success">Stock</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">Trạng thái</div>
                    <div class="h3 fw-bold text-info">Form</div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng quản lý</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/dashboard">📊 Thống kê</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/users">👥 Quản lý khách hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <h5 class="fw-bold mb-3">🚗 Thêm / Sửa xe</h5>
                    <div class="alert alert-danger" th:if="${error}" th:utext="${error}"></div>
                    <form class="row g-3" enctype="multipart/form-data" method="post" th:action="@{/car/save}"
                        th:object="${car}">
                        <input th:field="*{id}" type="hidden" />
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Tên xe</label>
                            <input class="form-control" placeholder="VD: BMW X5" required="" th:field="*{name}"
                                type="text" />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Hãng xe</label>
                            <select class="form-select" required="" th:field="*{brandId}">
                                <option value="">-- Chọn hãng xe --</option>
                                <option value="1">Toyota</option>
                                <option value="2">BMW</option>
                                <option value="3">Mercedes</option>
                                <option value="4">Honda</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Giá xe</label>
                            <input class="form-control" min="1" placeholder="3500000000" required="" th:field="*{price}"
                                type="number" />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Năm sản xuất</label>
                            <input class="form-control" max="2035" min="2000" placeholder="2024" th:field="*{year}"
                                type="number" />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Màu sắc</label>
                            <input class="form-control" placeholder="Đen, Trắng, Xanh..." th:field="*{color}"
                                type="text" />
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label cs-muted">Số lượng tồn kho</label>
                            <input class="form-control" min="0" placeholder="VD: 10" required="" th:field="*{stock}"
                                type="number" />
                        </div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Đăng ký lần đầu</label><input class="form-control" placeholder="Tháng 11 Năm 2023" th:field="*{firstRegistration}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Số km đã đi</label><input class="form-control" min="0" th:field="*{mileage}" type="number" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Loại động cơ</label><input class="form-control" placeholder="Xăng" th:field="*{engineType}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Dung tích động cơ</label><input class="form-control" placeholder="1.5L Turbo" th:field="*{engineCapacity}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Màu nội thất</label><input class="form-control" placeholder="Đen" th:field="*{interiorColor}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Loại xe</label><input class="form-control" placeholder="SUV" th:field="*{bodyType}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Số chỗ ngồi</label><input class="form-control" min="1" th:field="*{seats}" type="number" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Hệ dẫn động</label><input class="form-control" placeholder="FWD" th:field="*{drivetrain}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Hộp số</label><input class="form-control" placeholder="CVT" th:field="*{transmission}" type="text" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Công suất (HP)</label><input class="form-control" min="0" th:field="*{horsepower}" type="number" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Mô-men xoắn</label><input class="form-control" placeholder="240 Nm" th:field="*{torque}" type="text" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Nhiên liệu</label><input class="form-control" placeholder="Xăng" th:field="*{fuelType}" type="text" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Tiêu hao nhiên liệu</label><input class="form-control" placeholder="6.8 L/100km" th:field="*{fuelConsumption}" type="text" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Bảo hành</label><input class="form-control" placeholder="12 tháng" th:field="*{warranty}" type="text" /></div>
                        <div class="col-12 col-md-4"><label class="form-label cs-muted">Mức kiểm định</label><input class="form-control" placeholder="CarStore Certified" th:field="*{inspectionLevel}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Tên đại lý</label><input class="form-control" th:field="*{dealerName}" type="text" /></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Địa chỉ đại lý</label><input class="form-control" th:field="*{dealerAddress}" type="text" /></div>
                        <div class="col-12"><label class="form-label cs-muted">Ghi chú kiểm định</label><textarea class="form-control" rows="2" th:field="*{inspectionNote}"></textarea></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Trang bị an toàn</label><textarea class="form-control" rows="3" th:field="*{safetyFeatures}"></textarea></div>
                        <div class="col-12 col-md-6"><label class="form-label cs-muted">Tiện nghi</label><textarea class="form-control" rows="3" th:field="*{comfortFeatures}"></textarea></div>
                        <div class="col-12">
                            <label class="form-label cs-muted">Ảnh xe</label>
                            <input accept="image/*" class="form-control" id="imageInput" name="file" type="file" />
                            <div class="form-text cs-muted">Ảnh sẽ lưu vào thư mục static/images và hiển thị ở trang
                                danh sách xe.</div>
                        </div>
                        <div class="col-12">
                            <div class="cs-muted mb-2">Preview</div>
                            <img class="img-fluid rounded-3" id="previewImage"
                                style="max-height:260px;object-fit:cover;border:1px solid rgba(15,23,42,.12);"
                                th:src="${car.image != null and !#strings.isEmpty(car.image)} ? @{'/images/' + ${car.image}} : @{/images/camry.jpg}" />
                        </div>
                        <div class="col-12">
                            <label class="form-label cs-muted">Mô tả</label>
                            <textarea class="form-control" placeholder="Nhập mô tả xe" rows="4"
                                th:field="*{description}"></textarea>
                        </div>
                        <div class="col-12 d-flex gap-2 flex-wrap">
                            <button class="btn cs-btn cs-btn-primary" type="submit">💾 Lưu xe</button>
                            <a class="btn cs-btn cs-btn-outline" href="/admin/inventory">Quản lý tồn kho</a>
                            <a class="btn cs-btn cs-btn-ghost" href="/car/list">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
    <script>
        const imageInput = document.getElementById('imageInput');
        const previewImage = document.getElementById('previewImage');
        if (imageInput && previewImage) {
            imageInput.addEventListener('change', function () {
                const file = this.files && this.files[0];
                if (!file) return;
                previewImage.src = URL.createObjectURL(file);
            });
        }
    </script>
</body>

</html>
