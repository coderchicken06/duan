<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/app.css">
    <link rel="stylesheet" href="/assets/ford-home.css">

    <!-- Vue + Axios -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div th:replace="fragments/header :: header(false, false)"></div>

    <div id="adminApp" class="container cs-container py-4">

        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">🧰 Admin</div>
            <h1 class="cs-page-title mb-1">ADMIN DASHBOARD</h1>
            <div class="cs-muted">Thống kê, biểu đồ và CRUD xe qua REST API.</div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-12 col-lg-6">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">💰 Doanh thu</div>
                    <div class="display-6 fw-bold">{{ formatMoney(revenue) }}</div>
                </div>
            </div>
            <div class="col-12 col-lg-6">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">📊 Biểu đồ</div>
                    <canvas id="chart" height="130"></canvas>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-lg-5">
                <div class="cs-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 class="mb-0 fw-bold">🔥 Top xe bán chạy</h3>
                        <span class="cs-badge">{{ topCars.length }} items</span>
                    </div>

                    <div class="list-group list-group-flush" style="background:transparent;">
                        <div class="list-group-item d-flex justify-content-between align-items-center"
                            v-for="t in topCars" :key="t.car_id"
                            style="background:transparent;border-color:rgba(255,255,255,.10);color:rgba(255,255,255,.9)">
                            <div>
                                <div class="cs-muted" style="font-size:.9rem;">Car ID</div>
                                <div class="fw-semibold">{{ t.car_id }}</div>
                            </div>
                            <span class="cs-badge">Qty: {{ t.qty }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-7">
                <div class="cs-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 class="mb-0 fw-bold">Quản lý xe</h3>
                        <span class="cs-muted" style="font-size:.95rem;">CRUD qua `/api/cars`</span>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-12 col-md-7">
                            <input class="form-control" v-model="car.name" placeholder="Tên xe">
                        </div>
                        <div class="col-12 col-md-5">
                            <input class="form-control" v-model.number="car.price" placeholder="Giá">
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button class="btn cs-btn cs-btn-primary" @click="save()">Lưu</button>
                            <button class="btn cs-btn cs-btn-ghost" @click="car = {}">Reset</button>
                        </div>
                    </div>

                    <div class="vstack gap-2">
                        <div class="cs-card p-3 d-flex flex-row justify-content-between align-items-center"
                            style="box-shadow:none;" v-for="c in cars" :key="c.id">
                            <div>
                                <div class="fw-semibold">{{ c.name }}</div>
                                <div class="cs-muted">{{ formatMoney(c.price) }}</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn cs-btn cs-btn-warning btn-sm" @click="edit(c)">Sửa</button>
                                <button class="btn cs-btn cs-btn-danger btn-sm" @click="remove(c.id)">Xóa</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script>
        new Vue({
            el: "#adminApp",

            data: {
                cars: [],
                car: {},
                revenue: 0,
                topCars: [],
                chart: null // 👉 tránh vẽ chart nhiều lần
            },

            created() {
                this.load();
                this.loadRevenue();
                this.loadTop();
            },

            methods: {

                // 📥 Load danh sách xe
                load() {
                    axios.get("/api/cars")
                        .then(r => {
                            this.cars = r.data;
                        })
                        .catch(err => console.error(err));
                },

                // 💰 Load doanh thu
                loadRevenue() {
                    axios.get("/api/orders/revenue")
                        .then(r => {
                            this.revenue = r.data || 0;
                            this.drawChart();
                        })
                        .catch(err => console.error(err));
                },

                // 🔥 Load top xe
                loadTop() {
                    axios.get("/api/orders/top")
                        .then(r => {
                            this.topCars = r.data;
                        })
                        .catch(err => console.error(err));
                },

                // 💾 Lưu xe
                save() {
                    let request;

                    if (this.car.id) {
                        request = axios.put("/api/cars/" + this.car.id, this.car);
                    } else {
                        request = axios.post("/api/cars", this.car);
                    }

                    request.then(() => {
                        this.load();
                        this.car = {};
                    }).catch(err => console.error(err));
                },

                // ✏️ Sửa xe (FIX lỗi spread operator)
                edit(c) {
                    this.car = Object.assign({}, c);
                },

                // ❌ Xóa xe
                remove(id) {
                    axios.delete("/api/cars/" + id)
                        .then(() => this.load())
                        .catch(err => console.error(err));
                },

                // 💵 format tiền (FIX crash null)
                formatMoney(x) {
                    if (!x) return "0 VND";
                    return Number(x).toLocaleString() + " VND";
                },

                // 📊 Vẽ biểu đồ (FIX memory leak)
                drawChart() {

                    if (this.chart) {
                        this.chart.destroy();
                    }

                    this.chart = new Chart(document.getElementById("chart"), {
                        type: 'bar',
                        data: {
                            labels: ["Doanh thu"],
                            datasets: [{
                                label: "VND",
                                data: [this.revenue]
                            }]
                        }
                    });
                }
            }
        });
    </script>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
