<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Lịch sử yêu cầu - CarStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tổng yêu cầu</div>
                    <div class="display-6 fw-bold" th:text="${#lists.size(list)}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">Dịch vụ</div>
                    <div class="display-6 fw-bold text-primary" th:text="${#lists.size(list.?[type == 'service'])}">0
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Hỗ trợ</div>
                    <div class="display-6 fw-bold text-warning" th:text="${#lists.size(list.?[type != 'service'])}">0
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">Đã xử lý</div>
                    <div class="display-6 fw-bold text-success" th:text="${#lists.size(list.?[status == 'Đã xử lý'])}">0
                    </div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng lịch sử</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/order/my-orders">📦 Lịch sử đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/history">📋 Lịch sử yêu cầu</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <h5 class="fw-bold mb-0">📋 Lịch sử yêu cầu</h5>
                        <div class="d-flex gap-2 flex-wrap">
                            <a class="btn cs-btn cs-btn-outline btn-sm" href="/history">Tất cả</a>
                            <a class="btn cs-btn cs-btn-outline btn-sm" href="/history?type=service">Dịch vụ</a>
                            <a class="btn cs-btn cs-btn-outline btn-sm" href="/history?type=chat">Hỗ trợ</a>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Loại</th>
                                    <th>Họ tên</th>
                                    <th>SĐT</th>
                                    <th>Nội dung</th>
                                    <th>Xe</th>
                                    <th>Dịch vụ</th>
                                    <th>Ngày hẹn</th>
                                    <th>Giờ hẹn</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${list}">
                                    <td th:text="${item.id}"></td>
                                    <td><span class="badge bg-primary" th:text="${item.type}"></span></td>
                                    <td th:text="${item.name}"></td>
                                    <td th:text="${item.phone}"></td>
                                    <td th:text="${item.content}"></td>
                                    <td th:text="${item.carInfo != null ? item.carInfo : '-'}"></td>
                                    <td th:text="${item.serviceType != null ? item.serviceType : '-'}"></td>
                                    <td th:text="${item.appointmentDate != null ? item.appointmentDate : '-'}"></td>
                                    <td th:text="${item.appointmentTime != null ? item.appointmentTime : '-'}"></td>
                                    <td><span class="badge bg-warning text-dark" th:text="${item.status}"></span></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(list)}">
                                    <td class="text-center cs-muted py-4" colspan="10">Chưa có yêu cầu nào.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </section>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
