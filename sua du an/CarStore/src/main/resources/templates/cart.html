<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Car Store | Giỏ Hàng Đặt Cọc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
    </meta>
</head>

<body class="bg-light">
    <div id="cartAlert" class="cart-alert"></div>

    <div th:replace="fragments/header :: header(false, false)"></div>

    <div class="container cs-container py-4">

        <div class="cs-hero mb-4 bg-light p-4 rounded-4 border d-flex justify-content-between align-items-center">
            <div>
                <div class="cs-badge mb-3">🛒 Shopping</div>
                <h1 class="cs-page-title m-0">🛒 Giỏ hàng đặt cọc của bạn</h1>
            </div>
            <a th:href="@{/order/checkout}" class="btn btn-success rounded-pill px-3 py-2" role="button"
                title="Thanh toán">Thanh toán</a>
        </div>

        <div class="row g-4">

            <div class="col-12 col-lg-8">
                <div class="cs-card p-4 bg-white border rounded-4 shadow-sm">
                    <div class="table-responsive overflow-auto">
                        <table class="table align-middle mb-0 cart-table">
                            <thead>
                                <tr>
                                    <th>Mẫu xe</th>
                                    <th class="text-center">Đơn giá</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-center" style="width:180px;">Tổng cộng</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${cart}" th:id="${'cart-row-' + c.id}">
                                    <td class="fw-bold text-uppercase" th:text="${c.name}"></td>
                                    <td class="text-center money-cell"
                                        th:text="${#numbers.formatDecimal(c.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                                    </td>

                                    <td class="text-center cart-qty-cell">
                                        <div class="cart-qty-box d-inline-flex">
                                            <button type="button" class="btn btn-sm btn-light border cart-qty-btn"
                                                th:attr="data-id=${c.id}"
                                                onclick="changeCartQty(this, 'decrement')">-</button>
                                            <span class="cart-qty-number" th:id="${'qty-' + c.id}"
                                                th:text="${c.quantity}">1</span>
                                            <button type="button" class="btn btn-sm btn-light border cart-qty-btn"
                                                th:attr="data-id=${c.id}"
                                                onclick="changeCartQty(this, 'increment')">+</button>
                                        </div>
                                    </td>

                                    <td class="text-center text-primary fw-bold money-cell"
                                        th:id="${'line-total-' + c.id}" th:attr="data-price=${c.price}"
                                        th:text="${#numbers.formatDecimal(c.price * c.quantity, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                                    </td>

                                    <td class="text-center" style="width:90px;">
                                        <a class="btn btn-danger btn-sm rounded-pill px-3"
                                            th:href="@{'/cart/remove/' + ${c.id}}">
                                            Xóa
                                        </a>
                                    </td>
                                </tr>

                                <tr th:if="${#lists.isEmpty(cart)}">
                                    <td colspan="5" class="text-center text-muted py-4">Giỏ hàng trống rỗng!</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4" th:if="${!#lists.isEmpty(cart)}">
                <div class="cs-card p-4 bg-white border rounded-4 shadow-sm">
                    <h4 class="fw-bold border-bottom pb-2">Thông tin nhận xe</h4>

                    <form th:action="@{/order/checkout}" method="get">
                        <div class="mb-3">
                            <label class="form-label small text-muted fw-bold">Địa chỉ thường trú (đăng ký biển
                                số)</label>
                            <textarea class="form-control" name="address" placeholder="Nhập địa chỉ chính xác..."
                                rows="3" required></textarea>
                        </div>
                        <hr class="my-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-muted fw-semibold">Tổng thanh toán:</span>
                            <span id="cart-total" class="h4 text-danger fw-bold m-0"
                                th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</span>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold">Gửi yêu cầu đặt xe
                            ngay</button>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script>
        function formatVnd(value) {
            return Number(value || 0).toLocaleString('vi-VN') + ' VNĐ';
        }

        function showCartAlert(message, isError) {
            const alertBox = document.getElementById('cartAlert');
            if (!alertBox) return;

            alertBox.textContent = message;
            alertBox.classList.toggle('error', !!isError);
            alertBox.classList.add('show');

            setTimeout(() => alertBox.classList.remove('show'), 1400);
        }

        async function changeCartQty(button, action) {
            const id = button.getAttribute('data-id');
            if (!id) return;

            button.disabled = true;

            try {
                const response = await fetch('/cart/' + action + '-api/' + id, {
                    method: 'GET',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                const data = await response.json();

                if (!data.success) {
                    showCartAlert(data.message || 'Không thể cập nhật giỏ hàng', true);
                    return;
                }

                const items = Array.isArray(data.items) ? data.items : [];
                const item = items.find(i => Number(i.id) === Number(id));
                const row = document.getElementById('cart-row-' + id);

                if (!item) {
                    if (row) row.remove();
                } else {
                    const qtyEl = document.getElementById('qty-' + id);
                    const lineTotalEl = document.getElementById('line-total-' + id);

                    if (qtyEl) qtyEl.textContent = item.quantity;

                    if (lineTotalEl) {
                        const price = Number(lineTotalEl.getAttribute('data-price') || item.price || 0);
                        lineTotalEl.textContent = formatVnd(price * Number(item.quantity || 0));
                    }
                }

                const totalEl = document.getElementById('cart-total');
                if (totalEl) totalEl.textContent = formatVnd(data.total);

                showCartAlert('Cập nhật giỏ hàng thành công', false);

                if (items.length === 0) {
                    setTimeout(() => window.location.reload(), 500);
                }
            } catch (error) {
                showCartAlert('Lỗi kết nối, vui lòng thử lại', true);
            } finally {
                button.disabled = false;
            }
        }

        const searchToggle = document.getElementById('fordSearchToggle');
        const searchBar = document.getElementById('fordSearchBar');

        if (searchToggle && searchBar) {
            searchToggle.addEventListener('click', function () {
                const open = !searchBar.classList.contains('is-open');

                searchBar.classList.toggle('is-open', open);
                searchBar.setAttribute('aria-hidden', !open);

                if (open) {
                    const input = searchBar.querySelector('input');
                    if (input) input.focus();
                }
            });
        }
    </script>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
