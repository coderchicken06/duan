<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Dashboard - CarStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tổng số xe</div>
                    <div class="display-6 fw-bold" th:text="${totalCars}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tổng khách hàng</div>
                    <div class="display-6 fw-bold" th:text="${totalUsers}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">Tổng đơn hàng</div>
                    <div class="display-6 fw-bold text-primary" th:text="${totalOrders}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">Tổng doanh thu</div>
                    <div class="h3 fw-bold text-success" id="revenue-display">Đang tải...</div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng quản lý</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/dashboard">📊 Thống kê</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/users">👥 Quản lý khách hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <h5 class="fw-bold mb-3">🔥 Top xe bán chạy</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Xe</th>
                                    <th class="text-center">Số lượng</th>
                                    <th>Tỷ lệ</th>
                                </tr>
                            </thead>
                            <tbody id="top-cars-body">
                                <tr>
                                    <td class="text-center" colspan="3">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script th:inline="javascript">
        const formatVND = (value) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value || 0);
        fetch('/api/orders/revenue').then(res => { if (!res.ok) throw new Error('Không thể lấy doanh thu'); return res.json(); }).then(data => { document.getElementById('revenue-display').innerText = formatVND(data); }).catch(err => { console.error(err); document.getElementById('revenue-display').innerText = 'Lỗi tải dữ liệu'; });
        fetch('/api/orders/top').then(res => { if (!res.ok) throw new Error('Không thể lấy top xe'); return res.json(); }).then(data => { const tbody = document.getElementById('top-cars-body'); if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="3" class="text-center cs-muted">Chưa có dữ liệu bán hàng</td></tr>'; return; } tbody.innerHTML = data.map(car => `<tr><td><strong>${car.name || 'Không rõ tên xe'}</strong></td><td class="text-center"><span class="badge bg-primary rounded-pill">${car.qty || 0}</span></td><td style="width:40%"><div class="progress" style="height:8px;"><div class="progress-bar" role="progressbar" style="width:${Math.min((car.qty || 0) * 10, 100)}%"></div></div></td></tr>`).join(''); }).catch(err => { console.error(err); document.getElementById('top-cars-body').innerHTML = '<tr><td colspan="3" class="text-center text-danger">Không thể tải bảng thống kê</td></tr>'; });
    </script>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
