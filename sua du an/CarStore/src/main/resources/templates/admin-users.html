<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Quản lý khách hàng - CarStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Tổng tài khoản</div>
                    <div class="display-6 fw-bold" th:text="${#lists.size(users)}">0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">Admin</div>
                    <div class="display-6 fw-bold text-primary" th:text="${#lists.size(users.?[role == 'ROLE_ADMIN'])}">
                        0</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">User</div>
                    <div class="display-6 fw-bold text-success" th:text="${#lists.size(users.?[role == 'ROLE_USER'])}">0
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">Có email</div>
                    <div class="display-6 fw-bold text-info" th:text="${#lists.size(users.?[email != null])}">0</div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng quản lý</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/dashboard">📊 Thống kê</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/users">👥 Quản lý khách hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">👥 Danh sách khách hàng</h5><a class="btn cs-btn cs-btn-primary btn-sm"
                            href="/admin/users/create">➕ Thêm khách hàng</a>
                    </div>
                    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Username</th>
                                    <th>Fullname</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td><strong th:text="${user.username}"></strong></td>
                                    <td th:text="${user.fullname}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td><span class="badge bg-primary"
                                            th:if="${user.role == 'ROLE_ADMIN'}">ADMIN</span><span
                                            class="badge bg-success"
                                            th:unless="${user.role == 'ROLE_ADMIN'}">USER</span></td>
                                    <td class="text-nowrap"><a class="btn btn-warning btn-sm"
                                            th:href="@{'/admin/users/edit/' + ${user.username}}">Edit</a> <a
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('Bạn có chắc muốn xóa tài khoản này không?')"
                                            th:href="@{'/admin/users/delete/' + ${user.username}}"
                                            th:if="${user.username != 'admin'}">Delete</a></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td class="text-center cs-muted" colspan="5">Chưa có khách hàng nào.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
