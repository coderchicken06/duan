<!DOCTYPE html>

<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Thêm / Sửa khách hàng - CarStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}" />
    </meta>
</head>

<body>
    <div th:replace="fragments/header :: header(false, false)"></div>
    <main class="container py-4">
        <section class="row g-3">
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Khu vực</div>
                    <div class="h3 fw-bold">Admin</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 admin-stat-card">
                    <div class="cs-muted mb-2">Chức năng</div>
                    <div class="h3 fw-bold text-primary">User</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Vai trò</div>
                    <div class="h3 fw-bold text-success">ROLE</div>
                </div>
            </div>
            <div class="col-12 col-md-3">
                <div class="cs-card p-4 h-100 bg-light">
                    <div class="cs-muted mb-2">Trạng thái</div>
                    <div class="h3 fw-bold text-info">Form</div>
                </div>
            </div>
        </section>
        <section class="row g-3 mt-3">
            <div class="col-12 col-lg-4">
                <div class="cs-card p-4 h-100">
                    <div class="cs-muted mb-2">Chức năng quản lý</div>
                    <div class="d-grid gap-2">
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/dashboard">📊 Thống kê</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/inventory">🚗 Quản lý tồn kho</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/orders">📦 Quản lý đơn hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/support">📋 Quản lý yêu cầu</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/admin/users">👥 Quản lý khách hàng</a>
                        <a class="btn cs-btn cs-btn-outline text-start" href="/car/create">➕ Thêm xe mới</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="cs-card p-4">
                    <h5 class="fw-bold mb-3">👤 Thêm / Sửa khách hàng</h5>
                    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <form class="row g-3" method="post" th:action="@{/admin/users/save}" th:object="${account}">
                        <div class="col-12"><label class="form-label cs-muted">Username</label><input
                                class="form-control" required="" th:field="*{username}" type="text" /></div>
                        <div class="col-12"><label class="form-label cs-muted">Password</label><input
                                class="form-control" placeholder="Để trống nếu không đổi mật khẩu"
                                th:field="*{password}" type="password" /></div>
                        <div class="col-12"><label class="form-label cs-muted">Fullname</label><input
                                class="form-control" required="" th:field="*{fullname}" type="text" /></div>
                        <div class="col-12"><label class="form-label cs-muted">Email</label><input class="form-control"
                                required="" th:field="*{email}" type="email" /></div>
                        <div class="col-12"><label class="form-label cs-muted">Role</label><select class="form-select"
                                required="" th:field="*{role}">
                                <option value="ROLE_USER">User</option>
                                <option value="ROLE_ADMIN">Admin</option>
                            </select></div>
                        <div class="col-12 d-flex gap-2"><button class="btn cs-btn cs-btn-primary"
                                type="submit">Save</button><a class="btn cs-btn cs-btn-ghost"
                                href="/admin/users">Cancel</a></div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
