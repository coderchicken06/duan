<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${car.name}">Car Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/app.css}">
    <link rel="stylesheet" th:href="@{/assets/ford-home.css}">
</head>

<body>

    <div th:replace="fragments/header :: header(false, false)"></div>

    <div class="container cs-container py-4">
        <div class="cs-hero mb-4">
            <div class="cs-badge mb-3">🚗 Chi tiết xe</div>
            <h1 class="cs-page-title mb-0" th:text="${car.name}">Car Name</h1>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-6">
                <div class="cs-card p-3">
                    <img th:if="${car.image} != null" th:src="@{'/images/' + ${car.image}}" class="img-fluid rounded-3"
                        alt="Car Image">
                    <img th:if="${car.image} == null" th:src="@{/images/camry.jpg}" class="img-fluid rounded-3"
                        alt="Car Image">
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="cs-card p-4">
                    <h3 class="h4 mb-3" th:text="${car.name}">Car Name</h3>
                    <div class="mb-3">
                        <span class="cs-muted">Giá:</span>
                        <span class="h5 fw-bold text-primary" th:text="${car.price} + ' VND'">Price</span>
                    </div>
                    <div class="mb-3">
                        <span class="cs-muted">Mô tả:</span>
                        <p th:text="${car.description}">Description</p>
                    </div>
                    <div class="mb-3">
                        <span class="cs-muted">Năm sản xuất:</span>
                        <span th:text="${car.year}">Year</span>
                    </div>
                    <div class="mb-3">
                        <span class="cs-muted">Màu sắc:</span>
                        <span th:text="${car.color}">Color</span>
                    </div>
                    <div class="d-flex gap-2">
                        <a class="btn cs-btn cs-btn-primary" th:href="@{'/cart/add/' + ${car.id}}">Thêm vào giỏ</a>
                        <a class="btn cs-btn cs-btn-outline" href="/car/list">Quay lại danh sách</a>
                        <a class="btn cs-btn cs-btn-warning" th:href="@{'/car/edit/' + ${car.id}}"
                            sec:authorize="hasRole('ADMIN')">Sửa</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</body>

</html>
